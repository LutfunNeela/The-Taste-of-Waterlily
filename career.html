 <h2>Be a Part of Our Team</h2>
   <div id= "herojobs">
     <img src="image/hiring.jpg" height="50%" width="100%" alt="Hiring"></div>
	 
	 <fieldset>
	 <p>Fill out the form below to start your application.
	 All information is required.</p>
	 <form method="post" action="form.php" enctype="text/plain">
	 <label for="myName">Name:</label>
	 <input type="text" id="myName" name="myName" required>
	 
	  <label for="myEmail">E-mail:</label>
	 <input type="email" id="myEmail" name="myEmail" required>
	 
	 <label for="myPhone">Phone:</label>
        <input type="tel" id="myPhone" name="Phone" required>
	 
	  <label for="myDate">Start Date:</label>
	 <input type="date" id="myDate" name="myDate" required>
	 
	 <label for="position">Position:</label>
	 <input type="text" id="position" name="position" list="positions">
	 <datalist id="positions">
	 <option value="FOH" label="FOH">
	 <option value="BOH" label="BOH">
	 <option value="Manager" label="Manager">
	 <option value="Chef" label="Chef">
	 <option value="Other" label="Other">
	 </datalist>
	 
	  <label for="myExperience">Experience:</label>
	 <textarea type="text" id="myExperience" name="myExperience" rows="2" cols="20" required> </textarea>
	 <input type="file" id="document" name="document" accept=".pdf,.doc,.docx,.txt" Required><br>
	 
	 <input type="submit" id="submit" value="Apply Now">
	 </form>
	 </fieldset>
