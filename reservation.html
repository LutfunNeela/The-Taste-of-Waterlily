      <h2>Reservations</h2>
	  <p>Book your experience with us.</p>
     <form action="mailto:" method="post" enctype="text/plain">
        <label for="myName">Name:</label>
        <input type="text" id="myName" name="Name" required>

        <label for="myEmail"> E-mail:</label>
        <input type="email" id="myEmail" name="Email" required>

        <label for="myPhone">Phone:</label>
        <input type="tel" id="myPhone" name="Phone">

        <label for="myDate">Arrival Date:</label>
        <input type="date" id="myDate" name="Arrival_Date" required>
		
		 <label for="myTime">Arrival Time:</label>
        <input type="time" id="myTime" name="Arrival_Time" required>

        <label for="myPeople">Number of people:</label>
        <input type="number" id="myPeoples" name="People" min="1" max="20" required>
		
		<label for="identity">Verify your Identity:</label>
			<input type="text" id="identity" name="identity" list="identities">
			<datalist id="identities">
			<option value="Driver’s License" label="Driver’s License">
			<option value="State ID" label="State ID">
			<option value="Other" label="Other">
		</datalist>
		<input type="file" id="document" name="document" accept=".pdf,.doc,.docx,.txt" Required>

        <input type="submit" value="Submit">
        
      </form>
